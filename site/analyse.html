<!DOCTYPE html>
<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport" />
    <title>Smart Expenses — Analyse</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#a1e633", "background-dark": "#1b2111" } } }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            touch-action: pan-y;
        }

        html {
            overflow-x: hidden;
            height: 100%;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col">

    <header class="p-4 border-b border-primary/10 sticky top-0 z-10 bg-background-dark/90 backdrop-blur-lg">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="material-symbols-outlined text-primary">arrow_back</a>
            <h1 class="text-xl font-bold">Analyse Détaillée</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-28 p-4 space-y-6">

        <!-- DEPENSES PAR CATEGORIE (Donut) -->
        <section class="bg-primary/5 border border-primary/10 rounded-2xl p-4">
            <h3 class="text-sm font-bold text-primary/70 uppercase tracking-widest mb-4 text-center">Répartition des
                dépenses</h3>
            <div style="position:relative;height:220px;">
                <canvas id="category-donut"></canvas>
            </div>
            <div id="category-legend" class="mt-4 grid grid-cols-2 gap-2 text-[10px]"></div>
        </section>

        <!-- BAR CHART (Evolution Mensuelle) -->
        <section class="bg-primary/5 border border-primary/10 rounded-2xl p-4">
            <h3 class="text-sm font-bold text-primary/70 uppercase tracking-widest mb-4 text-center">Évolution Mensuelle
            </h3>
            <div style="position:relative;height:250px;">
                <canvas id="monthly-bar-chart"></canvas>
            </div>
            <div class="flex justify-center gap-4 mt-4">
                <div class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-primary"></span><span
                        class="text-[10px] text-slate-400">Revenus</span></div>
                <div class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-400"></span><span
                        class="text-[10px] text-slate-400">Dépenses</span></div>
                <div class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-blue-400"></span><span
                        class="text-[10px] text-slate-400">Épargne</span></div>
            </div>
        </section>

        <!-- TOP DEPENSES -->
        <section>
            <h3 class="text-base font-bold mb-3">Top Dépenses par Catégorie</h3>
            <div id="category-list" class="space-y-3">
                <div class="p-6 text-center text-slate-500 italic">Chargement...</div>
            </div>
        </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav
        class="fixed bottom-0 left-0 right-0 border-t border-primary/10 bg-background-dark/95 backdrop-blur-lg px-4 pb-6 pt-2 z-10">
        <div class="flex gap-2 max-w-md mx-auto">
            <a href="dashboard.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400 font-medium">
                <span class="material-symbols-outlined">home</span>
                <p class="text-[10px] uppercase tracking-widest">Accueil</p>
            </a>
            <a href="transactions.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400 font-medium">
                <span class="material-symbols-outlined">receipt_long</span>
                <p class="text-[10px] uppercase tracking-widest">Portefeuille</p>
            </a>
            <a href="analyse.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-primary font-bold">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">bar_chart</span>
                <p class="text-[10px] uppercase tracking-widest">Stats</p>
            </a>
            <a href="budgets.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400 font-medium">
                <span class="material-symbols-outlined">account_balance</span>
                <p class="text-[10px] uppercase tracking-widest">Budgets</p>
            </a>
        </div>
    </nav>

    <script>
        const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzhqd7wUttqGw-7AFiXp1zOi5B6xBSeuvVvid8Y3PskHvpea1KguHPEfMR_p_Z9M-sVKA/exec";

        function cleanAmount(v) {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            let s = String(v).replace(/\s/g, '').replace(',', '.').replace(/[^\d.-]/g, '');
            return parseFloat(s) || 0;
        }

        function fmtDH(v) {
            return new Intl.NumberFormat('fr-MA').format(Math.round(v)) + ' DH';
        }

        function getVal(t) {
            const m = cleanAmount(t.montant);
            const i = cleanAmount(t.income);
            return m || i || 0;
        }

        function isRev(t) {
            const incomeVal = String(t.income || "").trim().toLowerCase();
            return incomeVal !== "" && incomeVal !== "false" && incomeVal !== "0";
        }

        function parseDt(s) {
            if (!s) return null;
            let str = String(s).trim();
            if (s instanceof Date) return s;
            if (str.includes('Date(')) {
                const m = str.match(/\d+/g);
                if (m) return new Date(m[0], m[1], m[2]);
            }
            const parts = str.split(/[/\- ]/);
            if (parts.length >= 3) {
                if (parts[0].length === 2 || (parts[0].length === 1 && parts[2].length === 4)) {
                    const d = parseInt(parts[0], 10), m = parseInt(parts[1], 10) - 1, y = parseInt(parts[2], 10);
                    const dt = new Date(y, m, d);
                    if (!isNaN(dt.getTime())) return dt;
                } else if (parts[0].length === 4) {
                    const y = parseInt(parts[0], 10), m = parseInt(parts[1], 10) - 1, d = parseInt(parts[2], 10);
                    const dt = new Date(y, m, d);
                    if (!isNaN(dt.getTime())) return dt;
                }
            }
            let d = new Date(str);
            return isNaN(d.getTime()) ? null : d;
        }

        async function loadData() {
            try {
                const res = await fetch(`${SHEETS_API_URL}?action=getAll`);
                const data = await res.json();
                if (data.success) {
                    renderAnalyse(data.data);
                    renderMonthlyChart(data.data);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderAnalyse(tx) {
            const cats = {};
            let totalDep = 0;

            tx.forEach(t => {
                if (isRev(t)) return;
                const c = t.categorie || 'Autre';
                const a = getVal(t);
                cats[c] = (cats[c] || 0) + a;
                totalDep += a;
            });

            const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
            const labels = sorted.map(s => s[0]);
            const val = sorted.map(s => s[1]);

            // Donut Chart
            const ctx = document.getElementById('category-donut');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: val,
                        backgroundColor: [
                            '#a1e633', '#60a5fa', '#f87171', '#fbbf24', '#818cf8', '#f472b6', '#2dd4bf', '#a78bfa'
                        ],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            // Legend
            const legend = document.getElementById('category-legend');
            const colors = ['#a1e633', '#60a5fa', '#f87171', '#fbbf24', '#818cf8', '#f472b6', '#2dd4bf', '#a78bfa'];
            legend.innerHTML = sorted.slice(0, 8).map((s, i) => `
    <div class="flex items-center gap-1.5 truncate">
      <span class="size-2 rounded-full" style="background:${colors[i % colors.length]}"></span>
      <span class="text-slate-400 text-[9px]">${s[0]}:</span>
      <span class="font-bold text-[9px]">${Math.round(s[1] / (totalDep || 1) * 100)}%</span>
    </div>
  `).join('');

            // List
            const list = document.getElementById('category-list');
            list.innerHTML = sorted.map((s, i) => {
                const pct = Math.round(s[1] / (totalDep || 1) * 100);
                return `
      <div class="bg-primary/5 border border-primary/10 rounded-xl p-4">
        <div class="flex justify-between items-center mb-2">
          <p class="font-bold">${s[0]}</p>
          <p class="font-bold text-primary">${fmtDH(s[1])}</p>
        </div>
        <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
          <div class="h-full bg-primary" style="width:${pct}%"></div>
        </div>
        <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-tighter">${pct}% de vos dépenses totales</p>
      </div>
    `;
            }).join('');
        }

        function renderMonthlyChart(tx) {
            const months = {};
            tx.forEach(t => {
                const d = parseDt(t.date);
                if (!d) return;
                const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                if (!months[k]) months[k] = { rev: 0, dep: 0 };
                const a = getVal(t);
                if (isRev(t)) months[k].rev += a;
                else months[k].dep += a;
            });

            const keys = Object.keys(months).sort().slice(-6); // 6 derniers mois
            const labels = keys.map(k => {
                const [y, m] = k.split('-');
                return new Date(y, m - 1).toLocaleDateString('fr-FR', { month: 'short' });
            });
            const revData = keys.map(k => months[k].rev);
            const depData = keys.map(k => months[k].dep);
            const savData = keys.map(k => months[k].rev - months[k].dep);

            new Chart(document.getElementById('monthly-bar-chart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'Revenus', data: revData, backgroundColor: '#a1e633', borderRadius: 4 },
                        { label: 'Dépenses', data: depData, backgroundColor: '#f87171', borderRadius: 4 },
                        { label: 'Épargne', data: savData, backgroundColor: '#60a5fa', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
                        y: { grid: { color: 'rgba(161,230,51,0.05)' }, ticks: { color: '#64748b', font: { size: 9 }, callback: v => v >= 1000 ? (v / 1000) + 'k' : v } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = loadData;
    </script>
</body>

</html>
