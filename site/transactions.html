<!DOCTYPE html>
<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Expenses — Historique</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#a1e633", "background-dark": "#1b2111" } } }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col">

    <header class="sticky top-0 z-10 bg-background-dark/90 backdrop-blur-lg border-b border-primary/10">
        <div class="flex items-center p-4 justify-between">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="material-symbols-outlined text-primary">arrow_back</a>
                <h1 class="text-xl font-bold">Historique</h1>
            </div>
            <div id="sync-status" class="text-[10px] text-primary/60 bg-primary/10 px-2 py-1 rounded-full italic">
                Synchronisation...</div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24">
        <!-- Filtres simples -->
        <div class="flex gap-2 p-4 overflow-x-auto no-scrollbar">
            <button onclick="filterType('all')" id="btn-all"
                class="flex h-9 shrink-0 items-center justify-center rounded-lg bg-primary text-background-dark px-4 text-sm font-bold">Tout</button>
            <button onclick="filterType('rev')" id="btn-rev"
                class="flex h-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-slate-400 px-4 text-sm font-medium">Revenus</button>
            <button onclick="filterType('dep')" id="btn-dep"
                class="flex h-9 shrink-0 items-center justify-center rounded-lg bg-primary/10 text-slate-400 px-4 text-sm font-medium">Dépenses</button>
        </div>

        <!-- Liste des transactions -->
        <div id="history-list" class="divide-y divide-primary/5">
            <!-- Les données seront insérées ici -->
            <div class="p-10 text-center opacity-50">Chargement de votre fichier Google Sheets...</div>
        </div>

        <div id="empty-state" class="hidden p-20 text-center">
            <span class="material-symbols-outlined text-5xl text-slate-600 mb-4">search_off</span>
            <p class="text-slate-500">Aucune donnée trouvée</p>
        </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav
        class="fixed bottom-0 left-0 right-0 border-t border-primary/10 bg-background-dark/95 backdrop-blur-lg px-4 pb-6 pt-2 z-10">
        <div class="flex gap-2 max-w-md mx-auto">
            <a href="dashboard.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400">
                <span class="material-symbols-outlined">home</span>
                <p class="text-[10px] font-bold uppercase tracking-widest">Accueil</p>
            </a>
            <a href="transactions.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-primary">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
                <p class="text-[10px] font-bold uppercase tracking-widest">Portefeuille</p>
            </a>
            <a href="analyse.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400">
                <span class="material-symbols-outlined">bar_chart</span>
                <p class="text-[10px] font-bold uppercase tracking-widest">Stats</p>
            </a>
            <a href="budgets.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400">
                <span class="material-symbols-outlined">account_balance</span>
                <p class="text-[10px] font-bold uppercase tracking-widest">Budgets</p>
            </a>
        </div>
    </nav>

    <script>
        const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzhqd7wUttqGw-7AFiXp1zOi5B6xBSeuvVvid8Y3PskHvpea1KguHPEfMR_p_Z9M-sVKA/exec";

        let allTx = [];
        let currentFilter = 'all';

        // Formattage robuste des montants
        function cleanAmount(v) {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            return parseFloat(String(v).replace(/[^\d.-]/g, '')) || 0;
        }

        function fmtDH(v) {
            return new Intl.NumberFormat('fr-MA').format(Math.round(v)) + ' DH';
        }

        function isRev(t) {
            return t.income && String(t.income).trim() !== '';
        }

        // Parsing de date ultra-robuste
        function parseDt(s) {
            if (!s) return null;
            const str = String(s).trim();
            const parts = str.split(/[/\- ]/);
            if (parts.length >= 3) {
                if (parts[0].length === 4) return new Date(parts[0], parts[1] - 1, parts[2]); // YYYY-MM-DD
                return new Date(parts[2], parts[1] - 1, parts[0]); // DD/MM/YYYY
            }
            return new Date(str);
        }

        async function loadHistory() {
            try {
                const res = await fetch(`${SHEETS_API_URL}?action=getAll`);
                const data = await res.json();
                if (data.success) {
                    allTx = data.data;
                    document.getElementById('sync-status').textContent = `Dernière synchro : ${new Date().toLocaleTimeString('fr-FR')}`;
                    renderTransactions();
                }
            } catch (e) {
                document.getElementById('history-list').innerHTML = `<div class="p-10 text-center text-red-400">Impossible de charger les données. Vérifiez votre URL API.</div>`;
            }
        }

        function filterType(type) {
            currentFilter = type;
            ['all', 'rev', 'dep'].forEach(id => {
                const btn = document.getElementById('btn-' + id);
                btn.classList.toggle('bg-primary', id === type);
                btn.classList.toggle('text-background-dark', id === type);
                btn.classList.toggle('bg-primary/10', id !== type);
                btn.classList.toggle('text-slate-400', id !== type);
            });
            renderTransactions();
        }

        function renderTransactions() {
            const container = document.getElementById('history-list');
            const empty = document.getElementById('empty-state');

            let filtered = allTx;
            if (currentFilter === 'rev') filtered = allTx.filter(isRev);
            if (currentFilter === 'dep') filtered = allTx.filter(t => !isRev(t));

            // Tri par date (plus récent en haut)
            filtered.sort((a, b) => (parseDt(b.date) || 0) - (parseDt(a.date) || 0));

            if (filtered.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            container.innerHTML = filtered.map(t => {
                const revenue = isRev(t);
                const amount = cleanAmount(t.montant);
                const date = parseDt(t.date);
                const dateStr = date ? date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long' }) : t.date;
                const cat = revenue ? (t.income || 'Revenu') : (t.categorie || 'Dépense');
                const lieu = t.lieu || t.description || (revenue ? 'Entrée' : 'Sortie');

                return `
      <div class="flex items-center p-4 gap-4 hover:bg-primary/5 transition-colors">
        <div class="size-12 rounded-xl ${revenue ? 'bg-primary/20 text-primary' : 'bg-red-500/10 text-red-500'} flex items-center justify-center">
          <span class="material-symbols-outlined">${revenue ? 'trending_up' : 'payments'}</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-semibold truncate">${cat}</p>
          <p class="text-xs text-slate-500 truncate">${lieu}</p>
        </div>
        <div class="text-right">
          <p class="font-bold ${revenue ? 'text-primary' : 'text-slate-100'}">${revenue ? '+' : '-'}${fmtDH(amount)}</p>
          <p class="text-[10px] text-slate-500 uppercase tracking-tighter">${dateStr}</p>
        </div>
      </div>
    `;
            }).join('');
        }

        window.onload = loadHistory;
    </script>
</body>

</html>
