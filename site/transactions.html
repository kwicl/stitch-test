<!DOCTYPE html>
<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport" />
    <title>Smart Expenses — Historique</title>
    <script src="assets/tailwind.js"></script>
    <link href="assets/inter.css" rel="stylesheet" />
    <link href="assets/material.css" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff0000",
                        "background-dark": "#1a0000",
                        "surface": "#2d0000",
                        "surface2": "#4d0000",
                        "border-match": "#660000"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #1a0000;
            --surface: #2d0000;
            --surface2: #4d0000;
            --accent: #ff0000;
            --accent2: #8b0000;
            --text: #00ff41;
            --muted: #008f11;
            --border: #660000;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            width: 100%;
            touch-action: pan-y;
        }
        html { overflow-x: hidden; height: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* ── MODAL ─────────────────────────── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            backdrop-filter: blur(8px);
            align-items: flex-end;
            justify-content: center;
        }
        #modal-overlay.open {
            display: flex;
            animation: fadeIn .2s ease;
        }
        @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
        #modal-box {
            width: 100%;
            max-width: 430px;
            background: #2d0000;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 40px;
            border-top: 1px solid rgba(255,0,0,.35);
            animation: slideUp .3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }

        #modal-box input,
        #modal-box select,
        #modal-box textarea {
            width: 100%;
            background: rgba(255,0,0,.06);
            border: 1px solid rgba(255,0,0,.2);
            border-radius: 12px;
            color: #00ff41;
            padding: 12px 15px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
            margin-bottom: 12px;
            transition: border-color .2s;
        }
        #modal-box input:focus,
        #modal-box select:focus,
        #modal-box textarea:focus { border-color: #ff0000; }
        #modal-box select option { background: #2d0000; color: #00ff41; }

        /* ── FAB ───────────────────────────── */
        .fab-bordeaux {
            background-color: #8b0000 !important;
            color: #00ff41 !important;
            box-shadow: 0 8px 20px rgba(139,0,0,0.5);
            animation: glow-rouge 2s infinite alternate;
        }
        @keyframes glow-rouge {
            0%   { box-shadow: 0 8px 20px rgba(139,0,0,0.5), 0 0 5px rgba(255,0,0,0.2); }
            100% { box-shadow: 0 8px 20px rgba(255,0,0,0.6), 0 0 25px rgba(255,0,0,0.9), 0 0 50px rgba(255,0,0,0.4); }
        }
        #submit-btn {
            background-color: #8b0000 !important;
            color: #00ff41 !important;
            transition: all 0.2s;
        }
        #submit-btn:active { transform: scale(0.98); background-color: #600000 !important; }
        /* Tailwind overrides */
        .text-slate-400 { color: var(--muted) !important; }
        .text-white { color: var(--text) !important; }
        .text-slate-100 { color: var(--text) !important; }

        /* ── TOAST ─────────────────────────── */
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #e63946;
            color: #fff;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            z-index: 9999;
            opacity: 0;
            transition: all .3s ease;
            white-space: nowrap;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.error { background: #ef4444; }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="sticky top-0 z-10 bg-background-dark/90 backdrop-blur-lg border-b border-primary/10">

                    <img src="assets/piggy_bank_logo.png" alt="Logo" class="size-full object-cover" />
                </div>

            <button onclick="forceSync()" class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full bg-primary/10 hover:bg-primary/20 cursor-pointer transition-colors" title="Forcer l'actualisation">

    <!-- MODAL AJOUT / MODIFICATION -->
    <div id="modal-overlay" onclick="overlayClick(event)">
        <div id="modal-box">

                <h2 id="modal-title" class="text-lg font-bold">➕ Nouvelle transaction</h2>

    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <script>
        const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzso4_j0RnSIIKr9GFNcrondk6LbiSEb-FNaiOoYM305JcYOlZIT83kplbnt10h4Qggug/exec";

        // ═══════════════════════════════════════════════
        // CATEGORIES
        // ═══════════════════════════════════════════════
        const DEFAULT_SUBCATEGORIES = {
            'Café': ['Café du matin', 'Café avec amis', 'Réunion café', 'Pause café', 'Autre'],
            'Alimentation': ['Épicerie', 'Restaurant', 'Boulangerie', 'Fruits & Légumes', 'Viande / Poisson', 'Snack', 'Autre'],
            'Transport': ['Carburant', 'Taxi / VTC', 'Transport en commun', 'Parking', 'Péage', 'Autre'],
            'Déplacement': ["Voyage d'affaires", 'Taxi', 'Train / Bus', 'Hébergement', 'Autre'],
            'Santé': ['Pharmacie', 'Médecin', 'Dentiste', 'Analyses médicales', 'Optique', 'Autre'],
            'Voyages': ['Hôtel', 'Vol / Train', 'Restauration', 'Activités', 'Shopping', 'Souvenirs', 'Autre'],
            'Bien-être': ['Coiffeur', 'Spa / Massage', 'Salle de sport', 'Cosmétiques', 'Autre'],
            'Maison et frais de service': ['Eau', 'Électricité', 'Internet / Téléphone', 'Loyer', 'Entretien', 'Assurance', 'Autre'],
            'Électroménagers': ['Cuisine', 'Électronique', 'Mobilier', 'Décoration', 'Autre'],
            'Éducation enfant': ['Fournitures scolaires', 'Frais de scolarité', 'Activités parascolaires', 'Livres', 'Autre'],
            'vetements enfants': ['Vêtements été', 'Vêtements hiver', 'Chaussures', 'Uniforme scolaire', 'Autre'],
            'Appartement': ['Loyer', 'Charges', 'Réparations', 'Ameublement', 'Autre'],
            'appartement KENITRA': ['Loyer', 'Charges', 'Réparations', 'Autre'],
            'appartement CASA': ['Loyer', 'Charges', 'Réparations', 'Autre'],
            'villa tamesna': ['Charges', 'Entretien', 'Réparations', 'Jardinage', 'Autre'],
            'investissement LOT SAHEL icl': ['Avance', 'Tranche', 'Frais notaire', 'Taxes', 'Autre'],
            'INVESTISSEMENT': ['IPO Bourse', 'Capex IT', 'Immobilier', 'Bourse', 'Autre'],
            'Loisirs': ['Cinéma', 'Sorties', 'Jeux', 'Shopping', 'Livres', 'Autre'],
            'Salaire': ['Salaire mensuel', 'Prime', 'Bonus', 'Autre'],
            'Autres revenus': ['Location', 'Dividendes', 'Remboursement', 'Cadeau', 'Autre'],
            'Autre': ['Divers', 'Non classé', 'Autre'],
        };

        function loadCats() {
            try {
                const saved = localStorage.getItem('smartExpenses_cats');
                return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_SUBCATEGORIES));
            } catch { return JSON.parse(JSON.stringify(DEFAULT_SUBCATEGORIES)); }
        }
        let SUBCATEGORIES = loadCats();

        function populateCatSelect() {
            const sel = document.getElementById('f-categorie');
            const currentVal = sel.value;
            const cats = Object.keys(SUBCATEGORIES);
            const top = ['Café', 'Alimentation'];
            const others = cats.filter(c => !top.includes(c)).sort();
            sel.innerHTML = '<option value="">Choisir une catégorie…</option>';
            top.forEach(c => {
                if (cats.includes(c)) {
                    const opt = document.createElement('option');
                    opt.value = c; opt.textContent = c;
                    opt.style.fontWeight = 'bold'; opt.style.color = '#e63946';
                    sel.appendChild(opt);
                }
            });
            others.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                sel.appendChild(opt);
            });
            if (currentVal) sel.value = currentVal;
        }

        function onCatChange() {
            const cat = document.getElementById('f-categorie').value;
            const subSel = document.getElementById('f-sous-cat');
            const customInp = document.getElementById('f-sous-cat-custom');
            const subs = SUBCATEGORIES[cat] || [];
            subSel.innerHTML = '<option value="">Choisir une sous-catégorie…</option>' +
                subs.map(s => `<option value="${s}">${s}</option>`).join('') +
                '<option value="__custom__">✏️ Saisir manuellement…</option>';
            if (subs.length > 0) subSel.value = subs[0];
            subSel.style.display = 'block';
            customInp.style.display = 'none';
            customInp.value = '';
        }

        function onSubCatChange() {
            const subSel = document.getElementById('f-sous-cat');
            const customInp = document.getElementById('f-sous-cat-custom');
            if (subSel.value === '__custom__') { customInp.style.display = 'block'; customInp.focus(); }
            else customInp.style.display = 'none';
        }

        function getSelectedSubCat() {
            const subSel = document.getElementById('f-sous-cat');
            if (subSel.value === '__custom__') return document.getElementById('f-sous-cat-custom').value.trim();
            return subSel.value;
        }

        function onTypeChange() { populateCatSelect(); onCatChange(); }

        // ═══════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════
        let allTx = [];
        let currentFilter = 'all';

        function parseDt(s) {
            if (!s) return null;
            if (s instanceof Date) return s;
            let str = String(s).trim();
            if (str.includes('T')) str = str.split('T')[0];
            const parts = str.split(/[/\- ]/);
            if (parts.length >= 3) {
                let y, m, d;
                if (parts[0].length === 4) { // YYYY-MM-DD
                    y = parseInt(parts[0], 10); m = parseInt(parts[1], 10) - 1; d = parseInt(parts[2], 10);
                } else if (parts[2].length === 4) { // DD/MM/YYYY
                    y = parseInt(parts[2], 10); m = parseInt(parts[1], 10) - 1; d = parseInt(parts[0], 10);
                } else {
                    d = parseInt(parts[0], 10); m = parseInt(parts[1], 10) - 1; y = parseInt(parts[2], 10);
                }
                const dt = new Date(y, m, d);
                if (!isNaN(dt.getTime())) return dt;
            }
            if (str.includes('Date(')) {
                const m = str.match(/\d+/g);
                if (m) return new Date(m[0], m[1], m[2]);
            }
            const final = new Date(str);
            return isNaN(final.getTime()) ? null : final;
        }

        function isRev(t) {
            const v = String(t.income || "").trim().toLowerCase();
            return v !== "" && v !== "false" && v !== "0";
        }

        function cleanAmount(v) {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            const s = String(v).replace(/\s/g,'').replace(',','.').replace(/[^\d.-]/g,'');
            return parseFloat(s) || 0;
        }

        function fmtDH(v) {
            return new Intl.NumberFormat('fr-MA').format(Math.round(v)) + ' DH';
        }

        function getVal(t) {
            if (isRev(t)) return cleanAmount(t.income) || 0;
            return cleanAmount(t.montant) || 0;
        }

        function getLabel(t) {
            if (isRev(t)) {
                const inc = String(t.income || "").trim();
                if (!isNaN(inc) && !isNaN(parseFloat(inc))) return "Revenu";
                return inc || "Revenu";
            }
            return t.sous_categorie || t.categorie || "Dépense";
        }

        // ═══════════════════════════════════════════════
        // DATA LOADING
        // ═══════════════════════════════════════════════
        async function loadHistory() {
            try {
                // Show cached data first while loading
                const cached = JSON.parse(localStorage.getItem('local_tx_history') || '[]');
                if (cached.length > 0) {
                    allTx = mergePendingChanges(cached.map((t, idx) => ({ ...t, index: idx })));
                    renderTransactions();
                }

                const res = await fetch(`${SHEETS_API_URL}?action=getAll`);
                const data = await res.json();
                if (data.success) {
                    // Cache the clean data
                    localStorage.setItem('local_tx_history', JSON.stringify(data.data));
                    
                    allTx = mergePendingChanges(data.data.map((t, idx) => ({ ...t, index: idx })));
                    document.getElementById('sync-status').textContent = `Synchro : ${new Date().toLocaleTimeString('fr-FR')}`;
                    renderTransactions();
                }
            } catch (e) {
                console.error(e);
                // Fallback to absolute local + pending
                const cached = JSON.parse(localStorage.getItem('local_tx_history') || '[]');
                allTx = mergePendingChanges(cached.map((t, idx) => ({ ...t, index: idx })));
                if (allTx.length === 0) {
                    document.getElementById('history-list').innerHTML = `<div class="p-10 text-center text-red-400">Impossible de charger les données.<br>Vérifiez votre connexion.</div>`;
                } else {
                    renderTransactions();
                }
            }
            processQueue();
        }

        function mergePendingChanges(baseData) {
            const queue = JSON.parse(localStorage.getItem('pending_tx') || '[]');
            if (queue.length === 0) return baseData;
            
            let data = [...baseData];
            queue.forEach(item => {
                if (item.action === 'addTransaction') {
                    const exists = data.find(t => t.date === item.date && getVal(t) === getVal(item) && t.description === item.description);
                    if (!exists) data.unshift({ ...item, id: 'pending-' + Math.random().toString(36).substr(2, 9) });
                } else if (item.action === 'updateTransaction') {
                    const idx = data.findIndex(t => t.id === item.id);
                    if (idx > -1) data[idx] = { ...data[idx], ...item };
                } else if (item.action === 'deleteTransaction') {
                    data = data.filter(t => t.id !== item.id);
                }
            });
            return data;
        }

        let isProcessing = false;
        async function processQueue() {
            if (isProcessing || !navigator.onLine) return;
            const queue = JSON.parse(localStorage.getItem('pending_tx') || '[]');
            if (queue.length === 0) return;

            isProcessing = true;
            const item = queue[0];
            try {
                // On utilise mode: 'cors' (par défaut) pour mieux suivre les redirections de Google
                // On envoie en text/plain pour éviter la requête OPTIONS (preflight) qui échoue souvent sur GAS
                await fetch(SHEETS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify(item),
                    headers: { 'Content-Type': 'text/plain' }
                });
                
                const currentQueue = JSON.parse(localStorage.getItem('pending_tx') || '[]');
                currentQueue.shift();
                localStorage.setItem('pending_tx', JSON.stringify(currentQueue));
                
                isProcessing = false;
                if (currentQueue.length > 0) {
                    setTimeout(processQueue, 500);
                } else {
                    showToast('✅ Synchronisé avec Google Sheets');
                    setTimeout(loadHistory, 3000);
                }
            } catch (err) {
                console.warn("Échec de synchro, on réessaiera plus tard...", err);
                isProcessing = false;
            }
        }

        async function forceSync() {
            document.getElementById('sync-status').textContent = 'Sync...';
            showToast("🔄 Synchronisation...");
            await loadHistory();
        }

        // ═══════════════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════════════
        function filterType(type) {
            currentFilter = type;
            ['all','rev','dep'].forEach(id => {
                const btn = document.getElementById('btn-' + id);
                const active = id === type;
                btn.className = `flex h-9 shrink-0 items-center justify-center rounded-lg px-4 text-sm ${active ? 'bg-primary text-background-dark font-bold' : 'bg-primary/10 text-slate-400 font-medium'}`;
            });
            renderTransactions();
        }

        function renderTransactions() {
            const container = document.getElementById('history-list');
            const empty = document.getElementById('empty-state');

            let filtered = [...allTx];
            if (currentFilter === 'rev') filtered = allTx.filter(isRev);
            if (currentFilter === 'dep') filtered = allTx.filter(t => !isRev(t));

            filtered.sort((a, b) => {
                const da = parseDt(a.date), db = parseDt(b.date);
                const ta = da ? da.getTime() : 0, tb = db ? db.getTime() : 0;
                if (ta === tb) return (b.index || 0) - (a.index || 0);
                return tb - ta;
            });

            if (filtered.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            container.innerHTML = filtered.map(t => {
                const revenue = isRev(t);
                const amount = getVal(t);
                const date = parseDt(t.date);
                const dateStr = date ? date.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' }) : String(t.date || '');
                const catLabel = getLabel(t);
                const secondaryLabel = revenue ? 'Entrée' : (t.sous_categorie ? t.categorie : (t.lieu || t.description || 'Sortie'));
                const safeId = String(t.id || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");

                return `
<div class="flex items-center p-4 gap-4 hover:bg-primary/5 active:bg-primary/10 transition-colors cursor-pointer" onclick="editTx('${safeId}')">
  <div class="size-12 rounded-xl flex-shrink-0 flex items-center justify-center ${revenue ? 'bg-primary/20 text-primary' : 'bg-red-900/40 text-primary'}">
    <span class="material-symbols-outlined">${revenue ? 'trending_up' : 'payments'}</span>
  </div>
  <div class="flex-1 min-w-0">
    <p class="font-semibold truncate text-white">${catLabel}</p>
    <p class="text-xs text-slate-400 truncate">${secondaryLabel}</p>
  </div>
  <div class="text-right flex-shrink-0">
    <p class="font-bold ${revenue ? 'text-primary' : 'text-slate-100'}">${revenue ? '+' : '-'}${fmtDH(amount)}</p>
    <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${dateStr}</p>
  </div>
  <span class="material-symbols-outlined text-slate-600 text-[18px] flex-shrink-0">chevron_right</span>
</div>`;
            }).join('');
        }

        // ═══════════════════════════════════════════════
        // MODAL
        // ═══════════════════════════════════════════════
        function openModal() {
            document.getElementById('modal-overlay').classList.add('open');
            document.getElementById('modal-title').textContent = '➕ Nouvelle transaction';
            document.getElementById('f-id').value = '';
            document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
            document.getElementById('f-montant').value = '';
            document.getElementById('f-lieu').value = '';
            document.getElementById('f-desc').value = '';
            document.getElementById('f-income').value = '';
            populateCatSelect();
            onCatChange();
            document.getElementById('submit-label').textContent = 'Enregistrer';
            document.getElementById('submit-icon').textContent = '✅';
            document.getElementById('delete-btn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            document.getElementById('tx-form').reset();
            document.getElementById('f-sous-cat-custom').style.display = 'none';
        }

        function overlayClick(e) {
            if (e.target === document.getElementById('modal-overlay')) closeModal();
        }

        function editTx(id) {
            if (!id || id === 'undefined') {
                showToast('⚠️ Transaction sans ID — sync requise', true);
                return;
            }
            const t = allTx.find(x => x.id === id);
            if (!t) { showToast('⚠️ Transaction introuvable', true); return; }

            openModal();
            document.getElementById('modal-title').textContent = '✏️ Modifier la transaction';
            document.getElementById('f-id').value = id;

            const dt = parseDt(t.date);
            if (dt) document.getElementById('f-date').value = dt.toISOString().slice(0, 10);

            document.getElementById('f-montant').value = getVal(t);
            document.getElementById('f-income').value = isRev(t) ? 'Revenu' : '';

            populateCatSelect();
            const parentCat = t.sous_categorie || t.categorie;
            document.getElementById('f-categorie').value = parentCat;
            onCatChange();

            const subSel = document.getElementById('f-sous-cat');
            const targetSub = t.categorie;
            if ([...subSel.options].some(o => o.value === targetSub)) {
                subSel.value = targetSub;
            } else {
                subSel.value = '__custom__';
                onSubCatChange();
                document.getElementById('f-sous-cat-custom').value = targetSub || '';
            }

            document.getElementById('f-lieu').value = t.lieu || '';
            document.getElementById('f-desc').value = t.description || '';
            document.getElementById('submit-label').textContent = 'Mettre à jour';
            document.getElementById('submit-icon').textContent = '💾';
            document.getElementById('delete-btn').style.display = 'flex';
        }

        async function deleteTx() {
            const id = document.getElementById('f-id').value;
            if (!id || !confirm('Supprimer cette transaction ?')) return;
            
            // OPTIMISTIC
            allTx = allTx.filter(t => t.id !== id);
            renderTransactions();
            closeModal();
            
            const payload = { action: 'deleteTransaction', id: id };
            const queue = JSON.parse(localStorage.getItem('pending_tx') || '[]');
            queue.push(payload);
            localStorage.setItem('pending_tx', JSON.stringify(queue));
            
            showToast('🗑️ Supprimé localement');
            processQueue();
        }

        async function submitTx(e) {
            e.preventDefault();
            const editingId = document.getElementById('f-id').value;
            const isRevenu = document.getElementById('f-income').value === 'Revenu';
            const montantVal = parseFloat(document.getElementById('f-montant').value) || 0;
            const sousCat = getSelectedSubCat();
            const parentCat = document.getElementById('f-categorie').value;

            const newTx = {
                id: editingId || '',
                date: document.getElementById('f-date').value,
                montant: isRevenu ? '' : montantVal,
                income: isRevenu ? montantVal : '',
                categorie: sousCat || parentCat,
                sous_categorie: parentCat,
                lieu: document.getElementById('f-lieu').value,
                description: document.getElementById('f-desc').value
            };

            // OPTIMISTIC UI
            if (editingId) {
                const idx = allTx.findIndex(t => t.id === editingId);
                if (idx > -1) allTx[idx] = { ...allTx[idx], ...newTx };
            } else {
                allTx.unshift({ ...newTx, index: allTx.length });
            }
            renderTransactions();
            closeModal();

            const payload = { ...newTx, action: editingId ? 'updateTransaction' : 'addTransaction' };
            const queue = JSON.parse(localStorage.getItem('pending_tx') || '[]');
            queue.push(payload);
            localStorage.setItem('pending_tx', JSON.stringify(queue));
            
            showToast(editingId ? '💾 Changement enregistré' : '📤 Ajout en cours...');
            processQueue();
        }

        window.addEventListener('online', processQueue);

        // ═══════════════════════════════════════════════
        // TOAST
        // ═══════════════════════════════════════════════
        function showToast(msg, err = false) {
            const t = document.getElementById('toast');
            if (!t) return;
            t.textContent = msg;
            t.className = 'show' + (err ? ' error' : '');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.className = '', 3500);
        }

        // ═══════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('f-sous-cat').addEventListener('change', onSubCatChange);
            loadHistory();
        });
    </script>
</body>

</html>
