<!DOCTYPE html>
<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Expenses — Budgets</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#a1e633", "background-dark": "#1b2111" } } }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col">

    <header class="p-4 border-b border-primary/10 sticky top-0 z-10 bg-background-dark/90 backdrop-blur-lg">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="material-symbols-outlined text-primary">arrow_back</a>
            <h1 class="text-xl font-bold">Suivi des Budgets</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-28 p-4 space-y-6">

        <!-- DEPENSES DU MOIS VS BUDGET -->
        <section class="bg-primary/10 border border-primary/20 rounded-2xl p-5">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-xs text-primary/70 uppercase font-bold tracking-widest mb-1">Dépenses ce mois</p>
                    <h2 id="total-spent" class="text-4xl font-bold">— DH</h2>
                </div>
                <div id="status-badge"
                    class="bg-primary text-background-dark text-[10px] font-bold px-3 py-1 rounded-full uppercase">
                    Optimal</div>
            </div>
            <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden mb-2">
                <div id="total-progress" class="h-full bg-primary" style="width:0%"></div>
            </div>
            <p id="budget-info" class="text-xs text-slate-400">Progression basée sur vos dépenses mensuelles moyennes
            </p>
        </section>

        <h3 class="text-base font-bold">Budgets par Catégorie</h3>
        <div id="budget-list" class="space-y-6">
            <div class="p-8 text-center text-slate-500 italic">Analyse de vos habitudes...</div>
        </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav
        class="fixed bottom-0 left-0 right-0 border-t border-primary/10 bg-background-dark/95 backdrop-blur-lg px-4 pb-6 pt-2 z-10">
        <div class="flex gap-2 max-w-md mx-auto">
            <a href="dashboard.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400 font-medium">
                <span class="material-symbols-outlined">home</span>
                <p class="text-[10px] uppercase tracking-widest">Accueil</p>
            </a>
            <a href="transactions.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400 font-medium">
                <span class="material-symbols-outlined">receipt_long</span>
                <p class="text-[10px] uppercase tracking-widest">Portefeuille</p>
            </a>
            <a href="analyse.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-slate-400 font-medium">
                <span class="material-symbols-outlined">bar_chart</span>
                <p class="text-[10px] uppercase tracking-widest">Stats</p>
            </a>
            <a href="budgets.html" class="flex flex-1 flex-col items-center gap-1 py-1 text-primary font-bold">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">account_balance</span>
                <p class="text-[10px] uppercase tracking-widest">Budgets</p>
            </a>
        </div>
    </nav>

    <script>
        const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzhqd7wUttqGw-7AFiXp1zOi5B6xBSeuvVvid8Y3PskHvpea1KguHPEfMR_p_Z9M-sVKA/exec";

        function cleanAmount(v) {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            let s = String(v).replace(/\s/g, '').replace(',', '.').replace(/[^\d.-]/g, '');
            return parseFloat(s) || 0;
        }

        function fmtDH(v) {
            return new Intl.NumberFormat('fr-MA').format(Math.round(v)) + ' DH';
        }

        function isRev(t) {
            return t.income && String(t.income).trim() !== "" && String(t.income).trim().toLowerCase() !== "false";
        }

        function parseDt(s) {
            if (!s) return null;
            let str = String(s).trim();
            const parts = str.split(/[/\- ]/);
            if (parts.length >= 3) {
                if (parts[0].length === 4) return new Date(parts[0], parts[1] - 1, parts[2]);
                return new Date(parts[2], parts[1] - 1, parts[0]);
            }
            return new Date(str);
        }

        async function loadData() {
            try {
                const res = await fetch(`${SHEETS_API_URL}?action=getAll`);
                const data = await res.json();
                if (data.success) {
                    renderBudgets(data.data);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderBudgets(tx) {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const cats = {};
            let totalSpentMonth = 0;

            tx.forEach(t => {
                if (isRev(t)) return;
                const d = parseDt(t.date);
                if (!d) return;

                if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                    const c = t.categorie || 'Autre';
                    const a = cleanAmount(t.montant);
                    cats[c] = (cats[c] || 0) + a;
                    totalSpentMonth += a;
                }
            });

            // Budget global estimé (on prend 20% de plus que la moyenne ou un palier fixe)
            // Pour la démo, on utilise un budget cible fictif basé sur les données
            const targetBudget = totalSpentMonth > 5000 ? totalSpentMonth * 1.2 : 10000;
            const globalPct = Math.min(100, Math.round((totalSpentMonth / targetBudget) * 100));

            document.getElementById('total-spent').textContent = fmtDH(totalSpentMonth);
            document.getElementById('total-progress').style.width = globalPct + '%';
            document.getElementById('budget-info').textContent = `Cible estimée : ${fmtDH(targetBudget)} pour ce mois.`;

            if (globalPct > 90) {
                document.getElementById('status-badge').textContent = 'CRITIQUE';
                document.getElementById('status-badge').className = 'bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase';
            }

            const list = document.getElementById('budget-list');
            const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);

            list.innerHTML = sorted.map(([name, amount]) => {
                // Calcul d'un budget par catégorie (exemple: 10% au dessus du montant actuel pour simuler une limite)
                const catLimit = amount * 1.25;
                const pct = Math.min(100, Math.round((amount / catLimit) * 100));
                let color = 'bg-primary';
                let icon = 'check_circle';
                let iconColor = 'text-primary';

                if (pct > 70) { color = 'bg-orange-500'; icon = 'warning'; iconColor = 'text-orange-500'; }
                if (pct > 90) { color = 'bg-red-500'; icon = 'error'; iconColor = 'text-red-500'; }

                return `
      <div class="space-y-3">
        <div class="flex justify-between items-end">
          <div>
            <p class="text-base font-bold">${name}</p>
            <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Budget estimé : ${fmtDH(catLimit)}</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-bold text-slate-100">${fmtDH(amount)}</p>
            <p class="text-[10px] text-slate-500 uppercase">Dépensé</p>
          </div>
        </div>
        <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
          <div class="h-full ${color} transition-all duration-1000" style="width:${pct}%"></div>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[16px] ${iconColor}">${icon}</span>
          <p class="${iconColor} text-[10px] font-bold uppercase tracking-widest">${pct}% de la limite</p>
        </div>
      </div>
    `;
            }).join('');
        }

        window.onload = loadData;
    </script>
</body>

</html>
